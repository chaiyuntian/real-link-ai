<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Issue 34 | Neon Pulse Corridor</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
      }
    </script>
    <style>
      :root {
        --bg: #05070c;
        --panel: rgba(4, 10, 18, 0.86);
        --line: rgba(123, 200, 255, 0.18);
        --text: #edf7ff;
        --muted: #acc7d8;
      }
      * { box-sizing: border-box; }
      body { margin:0; overflow:hidden; font-family:"Avenir Next","Segoe UI",sans-serif; color:var(--text); background:#02050b; }
      canvas { display:block; }
      .hud, .panel {
        position:fixed;
        z-index:2;
        border:1px solid var(--line);
        background:var(--panel);
        backdrop-filter: blur(8px);
      }
      .hud {
        top:16px;
        left:16px;
        right:16px;
        border-radius:18px;
        padding:14px 16px;
        display:grid;
        grid-template-columns:2fr repeat(5, 1fr);
        gap:12px;
        align-items:center;
      }
      .panel {
        right:16px;
        bottom:16px;
        width:min(380px, calc(100% - 32px));
        border-radius:20px;
        padding:16px;
      }
      .small { color:var(--muted); line-height:1.58; }
      button {
        width:100%;
        margin-top:10px;
        border:0;
        border-radius:14px;
        padding:12px 14px;
        font:inherit;
        font-weight:700;
        cursor:pointer;
        background:#97deff;
        color:#06111d;
      }
      a { color:#97deff; }
      strong { display:block; font-size:28px; margin-top:4px; }
      .meter {
        margin-top: 10px;
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255,255,255,.06);
      }
      .meter span {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #86ffd3, #97deff, #ffb26f);
      }
      @media (max-width:900px) {
        .hud { grid-template-columns:1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="hud">
      <div>
        <div>Neon Pulse Corridor</div>
        <div class="small" id="section">Load track analysis to start.</div>
      </div>
      <div>Score<strong id="score">0</strong></div>
      <div>Combo<strong id="combo">0</strong></div>
      <div>Misses<strong id="misses">0</strong></div>
      <div>Lane<strong id="lane">1</strong></div>
      <div>Hull<strong id="hull">100</strong></div>
    </div>

    <div class="panel">
      <p><a href="../../index.html">Back to tempo</a></p>
      <p class="small">Use `A`, `S`, `D` to switch lanes. Hit `Space` when a gate reaches the strike plane. The song, beat graph, and sections were generated and analyzed offline.</p>
      <label class="small" for="difficulty">Difficulty</label>
      <select id="difficulty" style="width:100%;margin-top:8px;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:inherit;">
        <option value="easy">Easy</option>
        <option value="normal" selected>Normal</option>
        <option value="hard">Hard</option>
      </select>
      <div class="small" style="margin-top:10px;">Corridor stability</div>
      <div class="meter"><span id="stability"></span></div>
      <p class="small" id="ending"></p>
      <button id="start">Start Run</button>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x04060d, 0.038);
      const camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 1.6, 6);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.3, 0.9);
      bloomPass.threshold = 0.0;
      bloomPass.strength = 0.85;
      bloomPass.radius = 0.36;
      composer.addPass(bloomPass);

      const ambient = new THREE.AmbientLight(0x95a9ff, 1.4);
      const point = new THREE.PointLight(0x7ffff0, 25, 50);
      point.position.set(0, 3, 4);
      scene.add(ambient, point);

      const corridor = new THREE.Group();
      scene.add(corridor);
      const laneXs = [-2.2, 0, 2.2];
      const walls = [];
      for (let i = 0; i < 28; i += 1) {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(4.4, 0.05, 10, 48),
          new THREE.MeshBasicMaterial({ color: 0x335bff, transparent: true, opacity: 0.42 })
        );
        ring.rotation.x = Math.PI / 2;
        ring.position.z = -i * 3;
        corridor.add(ring);
        walls.push(ring);
      }

      const laneLines = new THREE.Group();
      scene.add(laneLines);
      laneXs.forEach((x, index) => {
        const geometry = new THREE.CylinderGeometry(0.03, 0.03, 90, 6);
        const material = new THREE.MeshBasicMaterial({ color: index === 1 ? 0x97deff : 0x2f4d8d });
        const lane = new THREE.Mesh(geometry, material);
        lane.rotation.z = Math.PI / 2;
        lane.position.set(x, -0.7, -40);
        laneLines.add(lane);
      });

      const strikePlane = new THREE.Mesh(
        new THREE.BoxGeometry(7.6, 0.06, 0.6),
        new THREE.MeshBasicMaterial({ color: 0x97deff })
      );
      strikePlane.position.set(0, -0.85, 1.4);
      scene.add(strikePlane);

      const scoreEl = document.getElementById("score");
      const comboEl = document.getElementById("combo");
      const missesEl = document.getElementById("misses");
      const laneEl = document.getElementById("lane");
      const hullEl = document.getElementById("hull");
      const stabilityEl = document.getElementById("stability");
      const sectionEl = document.getElementById("section");
      const endingEl = document.getElementById("ending");
      const difficultyEl = document.getElementById("difficulty");

      const audio = new Audio("/tempo-audio/tempo/tempo-batch1.wav");
      audio.crossOrigin = "anonymous";

      let analysis = null;
      let notes = [];
      let laneIndex = 1;
      let score = 0;
      let combo = 0;
      let misses = 0;
      let hull = 100;
      let live = false;
      let baseSpeed = 15;
      let strikeWindow = 0.19;
      let bursts = [];
      const stars = Array.from({ length: 120 }, () => ({
        x: (Math.random() - 0.5) * 18,
        y: (Math.random() - 0.5) * 8,
        z: -Math.random() * 90,
        s: 0.02 + Math.random() * 0.08
      }));
      const starGeometry = new THREE.BufferGeometry();
      const starPositions = new Float32Array(stars.length * 3);
      const starMaterial = new THREE.PointsMaterial({ color: 0x96dfff, size: 0.12, transparent: true, opacity: 0.6 });
      const starfield = new THREE.Points(starGeometry, starMaterial);
      scene.add(starfield);

      function syncStats() {
        scoreEl.textContent = score;
        comboEl.textContent = combo;
        missesEl.textContent = misses;
        laneEl.textContent = laneIndex + 1;
        hullEl.textContent = Math.round(hull);
        stabilityEl.style.width = `${hull}%`;
      }

      function sectionForTime(time) {
        if (!analysis) return null;
        return analysis.sections.find((section) => time >= section.start && time < section.end) || analysis.sections.at(-1);
      }

      function makeNote(beat, index) {
        const lane = index % 3;
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(1.05, 1.05, 0.6),
          new THREE.MeshStandardMaterial({
            color: [0xffb26f, 0x97deff, 0x85ffd3][lane],
            emissive: [0x5a2e00, 0x0f2a52, 0x004d3c][lane],
            metalness: 0.2,
            roughness: 0.25
          })
        );
        mesh.position.set(laneXs[lane], -0.2, -60);
        scene.add(mesh);
        return {
          beat,
          lane,
          hit: false,
          missed: false,
          mesh
        };
      }

      function spawnBurst(note) {
        for (let i = 0; i < 12; i += 1) {
          const particle = new THREE.Mesh(
            new THREE.SphereGeometry(0.08, 6, 6),
            new THREE.MeshBasicMaterial({ color: [0xffb26f, 0x97deff, 0x85ffd3][note.lane] })
          );
          particle.position.copy(note.mesh.position);
          scene.add(particle);
          bursts.push({
            mesh: particle,
            velocity: new THREE.Vector3((Math.random() - 0.5) * 0.3, (Math.random() - 0.5) * 0.2, -0.15 - Math.random() * 0.2),
            life: 1
          });
        }
      }

      function buildNotes() {
        notes.forEach((note) => scene.remove(note.mesh));
        const filteredBeats = analysis.beats.filter((_, index) => {
          if (difficultyEl.value === "easy") return index % 2 === 0;
          if (difficultyEl.value === "hard") return true;
          return index % 1 === 0;
        });
        notes = filteredBeats.map((beat, index) => makeNote(beat, index));
      }

      async function init() {
        const response = await fetch("../../analysis/tempo-batch1-analysis.json");
        analysis = await response.json();
        buildNotes();
        sectionEl.textContent = `Estimated BPM ${analysis.estimatedBpm}. ${analysis.beatCount} beats detected.`;
      }

      function finish() {
        live = false;
        if (hull <= 0) endingEl.textContent = "Run result: the corridor shears apart before the final gate chain resolves.";
        else if (score >= Math.floor((analysis?.beatCount || 1) * 0.7)) endingEl.textContent = "Run result: premium chase line. The corridor stays coherent through the whole drop.";
        else if (score >= Math.floor((analysis?.beatCount || 1) * 0.4)) endingEl.textContent = "Run result: partial control. The route stays open, but the run drifts.";
        else endingEl.textContent = "Run result: too many bad hits. The tunnel loses sync and tears open.";
      }

      document.getElementById("start").onclick = async () => {
        if (!analysis) await init();
        baseSpeed = difficultyEl.value === "easy" ? 12 : difficultyEl.value === "hard" ? 19 : 15;
        strikeWindow = difficultyEl.value === "easy" ? 0.24 : difficultyEl.value === "hard" ? 0.14 : 0.19;
        score = 0;
        combo = 0;
        misses = 0;
        hull = 100;
        bursts.forEach((burst) => scene.remove(burst.mesh));
        bursts = [];
        laneIndex = 1;
        buildNotes();
        syncStats();
        endingEl.textContent = "";
        audio.currentTime = 0;
        live = true;
        await audio.play().catch(() => {
          live = false;
          sectionEl.textContent = "Playback blocked. Click start again.";
        });
      };

      window.addEventListener("keydown", (event) => {
        if (event.code === "KeyA") laneIndex = 0;
        if (event.code === "KeyS") laneIndex = 1;
        if (event.code === "KeyD") laneIndex = 2;
        if (event.code === "Space" && live) {
          const candidate = notes.find((note) => !note.hit && !note.missed && note.lane === laneIndex);
          if (!candidate) return;
          const delta = Math.abs(candidate.beat - audio.currentTime);
          if (delta <= strikeWindow) {
            candidate.hit = true;
            score += combo >= 8 ? 2 : 1;
            combo += 1;
            hull = Math.min(100, hull + 1.8);
            candidate.mesh.material.emissive.setHex(0xffffff);
            candidate.mesh.scale.setScalar(1.35);
            spawnBurst(candidate);
          } else {
            combo = 0;
            misses += 1;
            hull = Math.max(0, hull - 8);
          }
          syncStats();
        }
      });

      audio.addEventListener("ended", finish);

      function animate() {
        requestAnimationFrame(animate);
        const time = live ? audio.currentTime : 0;
        const activeSection = sectionForTime(time);
        const speed = activeSection?.label === "drop" ? baseSpeed + 3 : activeSection?.label === "lift" ? baseSpeed + 1.5 : baseSpeed;
        if (activeSection) {
          sectionEl.textContent = `${activeSection.label.toUpperCase()} section | BPM ${analysis?.estimatedBpm || "--"} | speed ${speed.toFixed(1)} | current ${time.toFixed(2)}s`;
        }

        walls.forEach((wall, index) => {
          wall.rotation.z += 0.002 + index * 0.00008;
          wall.material.opacity = 0.2 + Math.sin((time * 2) + index * 0.4) * 0.12;
        });

        stars.forEach((star, index) => {
          star.z += 0.8 + baseSpeed * 0.05;
          if (star.z > 6) star.z = -90;
          starPositions[index * 3] = star.x;
          starPositions[index * 3 + 1] = star.y;
          starPositions[index * 3 + 2] = star.z;
        });
        starGeometry.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
        starGeometry.attributes.position.needsUpdate = true;

        notes.forEach((note) => {
          const z = 1.4 - ((note.beat - time) * speed);
          note.mesh.position.set(laneXs[note.lane], -0.2, z);

          if (!note.hit && !note.missed && z > 2.2) {
            note.missed = true;
            misses += 1;
            combo = 0;
            hull = Math.max(0, hull - 10);
            syncStats();
          }

          if (note.hit) {
            note.mesh.rotation.x += 0.12;
            note.mesh.rotation.y += 0.18;
            note.mesh.position.y += 0.03;
          }
        });

        bursts = bursts.filter((burst) => burst.life > 0.04);
        bursts.forEach((burst) => {
          burst.mesh.position.add(burst.velocity);
          burst.life *= 0.92;
          burst.mesh.scale.setScalar(0.4 + (1 - burst.life));
          burst.mesh.material.opacity = burst.life;
          burst.mesh.material.transparent = true;
          if (burst.life <= 0.04) scene.remove(burst.mesh);
        });

        if (live && hull <= 0) {
          finish();
        }

        laneLines.children.forEach((lane, index) => {
          lane.material.color.setHex(index === laneIndex ? 0x97deff : 0x274475);
        });

        composer.render();
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
      syncStats();
    </script>
  </body>
  </html>
